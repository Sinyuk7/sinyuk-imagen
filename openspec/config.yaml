schema: agile-fast

context: |
  Project: Modular AI Image Generation Web UI
  Domain: AI Image Generation (Text-to-Image / Multi-Provider)
  
  Core Philosophy:
  This system acts as a "Multi-Provider API Console". Its primary responsibility is routing, configuration management, and payload forwarding, NOT semantic abstraction. It routes user intent to various AI backends with minimal system-level interference.
  
  Architectural Boundaries & Layers:
  1. Presentation Layer (UI): Pure presentation and user input collection. Strictly ignorant of backend API specifics.
  2. Orchestration Layer (Service): The absolute, bypass-proof single entry point for all generation tasks. Orchestrates the flow but contains zero API-specific mapping logic.
  3. Integration Layer (Providers): Encapsulates all external API interactions, authentication, and endpoint-specific payload formatting.
  
  Data Contracts & State:
  - Cross-layer communication must strictly utilize strongly typed data structures (Standard Request/Response Data Objects).
  - Raw dynamic structures (like bare dicts) are strictly prohibited for primary cross-layer data exchange, except for explicitly designated "escape hatch" fields intended for provider-specific advanced parameters.
  
  Anti-Goals (Strictly Forbidden):
  - NO global prompt processing pipelines or system-level prompt builders.
  - NO unified semantic translation (e.g., attempting to map parameters like "style_strength" uniformly across fundamentally different AI models).
  - NO independent parameter mapping modules or directories outside of the Integration Layer's encapsulation.

rules:
  tasks:
    - "Prefer the fewest concrete tasks that can complete the change safely."
    - "Only create tasks that are directly required by the current change; avoid placeholder phases."
    - "Keep each task executable and verifiable within a short session."
    - "Add only the smallest meaningful validation for the actual blast radius."

  relay:
    - "Summarize only work that actually happened in this session."
    - "Call out remaining TODOs, blockers, and risks explicitly."
    - "End with a ready-to-paste next-session prompt for fast resume."
